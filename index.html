<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RealGorilla Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            height: 100vh; 
            font-family: 'Impact', sans-serif; 
            background: #0a0a0a;
            overflow: hidden;
        }
        
        /* Main browser area */
        #main-browser { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Tab bar */
            #tab-bar {
            display: flex;
            background: #111;
            align-items: center;
            padding: 5px 5px 0 5px;
            gap: 3px;
            min-height: 36px;
            overflow: hidden;
        }
                #tabs {
            display: flex;
            gap: 3px;
            overflow-x: auto;
            scroll-behavior: smooth;
            max-width: calc(100vw - 50px);
            flex-shrink: 1;
            min-width: 0;
        }
        
        #tabs::-webkit-scrollbar { height: 0; }
        .tab {
            background: #1a1a1a;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #333;
            border-bottom: none;
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }
        .tab.active {
            background: #019999;
            color: #000;
            border-color: #019999;
        }
        .tab:hover:not(.active) { background: #2a2a2a; color: #fff; }
        .tab .close {
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        .tab .close:hover { color: #ff4444; }
        #new-tab-btn {
            background: #090506;
            color: #019999;
            border: 1px solid #019999;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            flex-shrink: 0;
        }
        #new-tab-btn:hover { background: #019999; color: #000; }
        
        /* Toolbar */
        #toolbar { 
            background: #019999; 
            padding: 8px 10px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        #url-bar { 
            flex-grow: 1; 
            padding: 8px 15px; 
            background: #fff; 
            border: none; 
            border-radius: 20px; 
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
        }
        #url-bar:focus { outline: 2px solid #fff; }
        
        .nav-btn { 
            background: #090506; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .nav-btn:hover { background: #333; }
        
        /* Webview container */
        #webview-container { 
            width: 100%; 
            flex-grow: 1; 
            position: relative;
        }
        webview { 
            width: 100%; 
            height: 100%; 
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }
        webview.active { display: flex; }
        
        /* Toggle bubble */
        #toggle-bubble {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: #019999;
            border-radius: 50% 0 0 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: right 0.3s ease, background 0.2s;
            font-size: 18px;
            color: #000;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
        }
        #toggle-bubble:hover { background: #fff; }
        #toggle-bubble.open { right: 300px; }
        
        /* AI Sidebar */
        #ai-sidebar {
            position: fixed;
            right: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: #090506;
            color: white;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
            z-index: 999;
            border-left: 2px solid #019999;
        }
        #ai-sidebar.open { right: 0; }
        #ai-sidebar h3 { 
            color: #019999; 
            margin-bottom: 15px; 
            font-size: 1.3em;
        }
        #chat-log { 
            flex-grow: 1; 
            overflow-y: auto; 
            margin-bottom: 10px; 
            background: #111; 
            padding: 10px; 
            border-radius: 5px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            line-height: 1.5;
        }
        #chat-log b { color: #019999; }
        #user-input { 
            padding: 10px; 
            border-radius: 10px; 
            border: none; 
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            background: #1a1a1a;
            color: white;
        }
        #user-input:focus { outline: 2px solid #019999; }
        #user-input::placeholder { color: #666; }
    </style>
</head>
<body>
    <div id="main-browser">
        <!-- Tab bar -->
        <div id="tab-bar">
            <div id="tabs">
                <button id="new-tab-btn" onclick="addTab()">+</button>
            </div>
        </div>
        
        <!-- Toolbar -->
        <div id="toolbar">
            <button class="nav-btn" onclick="navigateBack()">◀</button>
            <button class="nav-btn" onclick="navigateForward()">▶</button>
            <button class="nav-btn" onclick="navigateReload()">↻</button>
            <input type="text" id="url-bar" onkeypress="handleUrl(event)">
            <button class="nav-btn" onclick="navigateGo()">🦍</button>
        </div>
        
        <!-- Webview container -->
        <div id="webview-container"></div>
    </div>

    <!-- Toggle bubble -->
    <div id="toggle-bubble" onclick="toggleSidebar()">◀</div>

    <!-- AI Sidebar -->
    <div id="ai-sidebar">
        <h3>🦍 Gorilla AI</h3>
        <div id="chat-log"></div>
        <input type="text" id="user-input" placeholder="Ask DeepSeek..." onkeypress="handleAI(event)">
    </div>

    <script>
        let tabs = [];
        let activeTabId = null;
        let tabCounter = 0;
        
        function addTab(url = null) {
            if (!url) {
                url = `data:text/html,${encodeURIComponent(`
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>New Tab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:white;font-family:Impact,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:40px}
h1{font-size:2.5em;color:#019999;text-shadow:2px 2px 0 #000}
.shortcuts{display:flex;gap:25px;flex-wrap:wrap;justify-content:center}
.shortcut{background:#1a1a1a;border:2px solid #019999;border-radius:15px;padding:25px 20px;width:130px;text-align:center;cursor:pointer;transition:transform .2s,background .2s;color:white}
.shortcut:hover{transform:translateY(-5px);background:#019999;color:#000}
.shortcut .icon{font-size:3em;margin-bottom:10px}
.shortcut .label{font-size:1em}
.search-bar{display:flex;gap:10px;width:500px;max-width:90%}
.search-bar input{flex-grow:1;padding:12px 20px;border-radius:30px;border:2px solid #019999;background:#1a1a1a;color:white;font-size:16px;font-family:Segoe UI,sans-serif}
.search-bar input:focus{outline:none;border-color:#fff}
.search-bar button{background:#019999;color:#000;border:none;border-radius:30px;padding:12px 25px;cursor:pointer;font-weight:bold;font-size:16px;font-family:Impact,sans-serif}
.search-bar button:hover{background:#fff}
</style></head><body>
<h1>🦍 New Tab</h1>
<div class="search-bar"><input type="text" id="q" placeholder="Search Google or enter URL..." onkeypress="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">Go</button></div>
<div class="shortcuts">
<div class="shortcut" onclick="go('https://www.google.com')"><div class="icon">🔍</div><div class="label">Google</div></div>
<div class="shortcut" onclick="go('https://krunker.io')"><div class="icon">🔫</div><div class="label">Krunker</div></div>
<div class="shortcut" onclick="go('https://www.youtube.com')"><div class="icon">▶️</div><div class="label">YouTube</div></div>
<div class="shortcut" onclick="go('https://github.com')"><div class="icon">🐙</div><div class="label">GitHub</div></div>
<div class="shortcut" onclick="go('https://dere-w4eyt.github.io/realgorillaos-site/')"><div class="icon">🦍</div><div class="label">GorillaOS</div></div>
</div>
<script>
function go(u){window.location.href=u}
function doSearch(){let q=document.getElementById('q').value.trim();if(!q)return;if(q.includes('.')&&!q.includes(' ')){if(!q.startsWith('http'))q='https://'+q;window.location.href=q}else{window.location.href='https://www.google.com/search?q='+encodeURIComponent(q)}}
<\/script>
</body></html>`)}`;
            }
            
            const tabId = tabCounter++;
            const webview = document.createElement('webview');
            webview.id = 'webview-' + tabId;
            webview.src = url;
            
            webview.addEventListener('did-navigate', () => updateTabInfo(tabId));
            webview.addEventListener('did-navigate-in-page', () => updateTabInfo(tabId));
            
            document.getElementById('webview-container').appendChild(webview);
            
            tabs.push({ id: tabId, webview: webview, title: 'New Tab' });
            
            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.id = 'tab-' + tabId;
            tabEl.innerHTML = `<span class="tab-title">New Tab</span><span class="close" onclick="closeTab(event, ${tabId})">×</span>`;
            tabEl.onclick = (e) => { if (!e.target.classList.contains('close')) switchTab(tabId); };
            
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.insertBefore(tabEl, document.getElementById('new-tab-btn'));
            switchTab(tabId);
        }
        
        function switchTab(tabId) {
            tabs.forEach(t => {
                t.webview.style.display = 'none';
                document.getElementById('tab-' + t.id)?.classList.remove('active');
            });
            
            const tab = tabs.find(t => t.id === tabId);
            if (tab) {
                tab.webview.style.display = 'flex';
                document.getElementById('tab-' + tabId).classList.add('active');
                document.getElementById('url-bar').value = tab.webview.src;
                activeTabId = tabId;
            }
        }
        
        function closeTab(e, tabId) {
            e.stopPropagation();
            if (tabs.length === 1) return;
            
            const index = tabs.findIndex(t => t.id === tabId);
            const tab = tabs[index];
            tab.webview.remove();
            document.getElementById('tab-' + tabId).remove();
            tabs.splice(index, 1);
            
            if (activeTabId === tabId) {
                const newIndex = Math.min(index, tabs.length - 1);
                switchTab(tabs[newIndex].id);
            }
        }
        
        function updateTabInfo(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            const tabEl = document.getElementById('tab-' + tabId);
            if (tab && tabEl) {
                let title = tab.webview.getTitle() || tab.webview.src;
                if (title.length > 20) title = title.substring(0, 20) + '...';
                tab.title = title;
                tabEl.querySelector('.tab-title').textContent = title;
                if (activeTabId === tabId) {
                    document.getElementById('url-bar').value = tab.webview.src;
                }
            }
        }
        
        function getActiveWebview() {
            const tab = tabs.find(t => t.id === activeTabId);
            return tab ? tab.webview : null;
        }
        
        function navigateBack() {
            const wv = getActiveWebview();
            if (wv && wv.canGoBack()) wv.goBack();
        }
        
        function navigateForward() {
            const wv = getActiveWebview();
            if (wv && wv.canGoForward()) wv.goForward();
        }
        
        function navigateReload() {
            const wv = getActiveWebview();
            if (wv) wv.reload();
        }
        
        function navigateGo() {
            let url = document.getElementById('url-bar').value;
            if (!url.startsWith('http') && !url.startsWith('file:///')) url = 'https://' + url;
            const wv = getActiveWebview();
            if (wv) wv.src = url;
            document.getElementById('url-bar').value = url;
        }
        
        function handleUrl(e) {
            if (e.key === 'Enter') navigateGo();
        }
        
        // Mouse wheel scrolling for tabs
        document.getElementById('tabs').addEventListener('wheel', (e) => {
            e.preventDefault();
            document.getElementById('tabs').scrollLeft += e.deltaY;
        });
        
        // AI Sidebar
        let sidebarOpen = false;
        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            const sidebar = document.getElementById('ai-sidebar');
            const bubble = document.getElementById('toggle-bubble');
            if (sidebarOpen) {
                sidebar.classList.add('open');
                bubble.classList.add('open');
                bubble.innerHTML = '▶';
            } else {
                sidebar.classList.remove('open');
                bubble.classList.remove('open');
                bubble.innerHTML = '◀';
            }
        }
        
        async function handleAI(e) {
            if (e.key === 'Enter') {
                let input = document.getElementById('user-input');
                let userMessage = input.value;
                if (!userMessage.trim()) return;
                
                document.getElementById('chat-log').innerHTML += `<p><b>You:</b> ${userMessage}</p>`;
                input.value = '';
                
                try {
                    let reply = await window.gorillaAI.sendChat(userMessage);
                    document.getElementById('chat-log').innerHTML += `<p><b>🦍 AI:</b> ${reply}</p>`;
                } catch (err) {
                    document.getElementById('chat-log').innerHTML += `<p style="color:#ff4444;"><b>Error:</b> ${err.message || err}</p>`;
                }
                
                document.getElementById('chat-log').scrollTop = document.getElementById('chat-log').scrollHeight;
            }
        }
        
        // Start with first tab
        addTab('https://dere-w4eyt.github.io/realgorillaos-site/');
    </script>
</body>
</html>
